# Guardlink Workflow Feature Development With Tests And Docs

## Action

Follow the feature-development-with-tests-and-docs workflow:
1. Implement feature logic in relevant src/ files (e.g., parser, review, diff, agents, cli, etc.)
2. Update or add new types in src/types/
3. Update or add test suites in tests/ (e.g., parser.test.ts, review.test.ts, agents.test.ts, prompts.test.ts)
4. Update documentation files (e.g., docs/SPEC.md, docs/GUARDLINK_REFERENCE.md, README.md, AGENTS.md)
5. Update templates or agent instruction files if needed
6. Bump package version and update lock files

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/**/*.ts, src/types/**/*.ts, tests/**/*.test.ts


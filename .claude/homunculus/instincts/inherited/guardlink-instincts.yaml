# Guardlink Workflow Mode Or Configuration Expansion

## Action

Follow the mode-or-configuration-expansion workflow:
1. Update CLI and server logic to recognize new mode or flag (e.g., src/cli/index.ts, src/mcp/server.ts)
2. Update agents and prompts to support the new mode (e.g., src/agents/)
3. Update TUI commands/help text if applicable
4. Add or update tests to cover new mode values
5. Update documentation to reflect new options

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/cli/index.ts, src/mcp/server.ts, src/agents/**/*.ts

